<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/styles.css?v=20260419i' | relative_url }}">
  <script defer src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</head>
<body class="{% if page.hero_background or page.cover_image %}has-immersive-hero{% endif %}"{% if page.hero_background or page.cover_image %} style="--hero-nav-bg: linear-gradient(180deg, rgba(17, 29, 43, 0.46), rgba(17, 29, 43, 0.7)), url('{% if page.hero_background %}{{ page.hero_background | relative_url }}{% else %}{{ page.cover_image | relative_url }}{% endif %}');"{% endif %}>
  <div class="site-shell">
    <header class="topbar{% if page.hero_background or page.cover_image %} topbar-immersive{% endif %}">
      <div class="topbar-inner">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="topnav">
          <a class="{% if page.nav == 'home' %}is-active{% endif %}" href="{{ '/' | relative_url }}">首页</a>
          <a class="{% if page.nav == 'archive' %}is-active{% endif %}" href="{{ '/blog/index.html' | relative_url }}">归档</a>
          <a href="{{ '/' | relative_url }}#topics">分类</a>
          <a href="{{ '/' | relative_url }}#tags">标签</a>
          <a href="{{ '/' | relative_url }}#about">关于</a>
        </nav>
      </div>
    </header>

    <main class="page-layout">
      {{ content }}
    </main>
  </div>
  {% if page.hero_background or page.cover_image %}
  <script>
    (() => {
      const topbar = document.querySelector('.topbar-immersive');
      const hero = document.querySelector('.home-hero, .post-hero');
      if (!topbar || !hero) return;

      const syncTopbar = () => {
        const heroBottom = hero.getBoundingClientRect().bottom;
        const threshold = topbar.offsetHeight;
        topbar.classList.toggle('is-scrolled', heroBottom <= threshold);
      };

      syncTopbar();
      window.addEventListener('scroll', syncTopbar, { passive: true });
      window.addEventListener('resize', syncTopbar);
    })();
  </script>
  {% endif %}
</body>
</html>
