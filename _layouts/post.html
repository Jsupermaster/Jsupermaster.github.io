---
layout: default
---
<article class="post-layout post-layout-single">
  <div class="post-main post-main-single">
    <p class="section-kicker">{{ page.article_kicker | default: "BLOG POST" }}</p>
    <h1>{{ page.title }}</h1>
    <div class="post-header-meta">
      <span>{{ page.date | date: "%Y-%m-%d" }}</span>
      {% for category in page.categories %}
      <span>{{ category }}</span>
      {% endfor %}
    </div>

    {% if page.cover_image %}
    <img class="post-cover" src="{{ page.cover_image | relative_url }}" alt="{{ page.title }}">
    {% endif %}

    <div class="post-content">
      {{ content }}
    </div>

    <div class="post-actions">
      <a class="read-link" href="{{ '/blog/index.html' | relative_url }}">返回归档</a>
      <a class="read-link" href="{{ '/' | relative_url }}">返回首页</a>
    </div>
  </div>

</article>
